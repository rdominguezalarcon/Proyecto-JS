<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <header id="header"></header>
    <h1 id="titulo">Pago | Comidas Saludables</h1>
    <main>
        <form class="row g-3 col-5 needs-validation" id="formPago" validate>
            <div class="col-md-6 mb-3">
                <label for="validationCustom01" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="validationCustom01" value="" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="validationCustom02" class="form-label">Apellido</label>
                <input type="text" class="form-control" id="validationCustom02" value="" required>
            </div>
            <div class="mb-3 col-8">
                <label for="validationCustom02" class="form-label">DNI</label>
                <input type="text" class="form-control" id="validationCustom02" value="" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="validationCustom02" class="form-label">Direccion</label>
                <input type="text" class="form-control" id="validationCustom02" value="" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="validationCustom03" class="form-label">Localidad/Barrio</label>
                <input type="text" class="form-control" id="validationCustom03" required>
            </div>
            <div class="mb-3">
                <label for="validationCustom04" class="form-label">Ubicacion</label>
                <select class="form-select" id="validationCustom04" required>
                    <option selected disabled value="">Elegir...</option>
                    <option>Capital Federal</option>
                    <option>GBA Norte</option>
                    <option>GBA Oeste</option>
                    <option>GBA Sur</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="validationCustom05" class="form-label">Codigo Postal</label>
                <input type="text" class="form-control" id="validationCustom05" required>
            </div>
            <div class="mb-3">
                <label for="validationCustom04" class="form-label">Tarjeta</label>
                <select class="form-select" id="validationCustom04" required>
                    <option selected disabled value="">Elegir tarjeta...</option>
                    <option>VISA</option>
                    <option>MasterCard</option>
                    <option>Amex</option>
                </select>
            </div>

            <div class="col-12 mb-3">
                <label for="cardNumber" class="form-label">Número de tarjeta</label>
                <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456" required>
            </div>


            <div class="col-md-6 mb-3">
                <label for="expiryDate" class="form-label">Fecha de vencimiento</label>
                <input type="text" class="form-control" id="expiryDate" placeholder="MM/AA" required>
            </div>


            <div class="col-md-6 mb-3">
                <label for="cvv" class="form-label">Código de seguridad (CVV)</label>
                <input type="text" class="form-control" id="cvv" placeholder="123" required>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
                    <label class="form-check-label" for="invalidCheck">
                        Acepta terminos y condiciones
                    </label>
                    <div class="invalid-feedback">
                        Debes completar todos los campos!
                    </div>
                </div>
            </div>
            <div class="col-12">
                <button class="btn btn-primary aceptarCompra mb-3" type="submit" id="confirmar">Confirmar Pago</button>
            </div>
        </form>
    </main>
    <footer id="footer"></footer>

    <script src="/assets/js/finalizarCompra.js"></script>
    <script src="/assets/js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
